<div class="min-h-screen bg-neutral-50 text-neutral-900">
  <div class="mx-auto max-w-5xl p-6">

    <header class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold">🌱 Algo Harvest</h1>
        <p class="mt-1 text-sm text-neutral-500">
          Your long-term algorithm memory system
        </p>
      </div>

      <div class="rounded-2xl border bg-white px-4 py-2 shadow-sm">
        <p class="text-sm text-neutral-500">Problems mastered</p>
        <p class="text-2xl font-semibold">0</p>
      </div>
    </header>

    <section class="mb-8 rounded-3xl border bg-white p-6 shadow-sm">
      <h2 class="mb-4 text-lg font-semibold">
        Add solved problem
      </h2>

      <div class="flex flex-col gap-4 md:flex-row">

        <input
          type="text"
          placeholder="e.g. Two Sum"
          class="flex-1 rounded-2xl border px-4 py-3 outline-none focus:ring-2 focus:ring-neutral-300"
        />

        <select
          class="rounded-2xl border px-4 py-3 outline-none focus:ring-2 focus:ring-neutral-300"
        >
          <option>Easy</option>
          <option selected>Medium</option>
          <option>Hard</option>
        </select>

        <button
          class="rounded-2xl bg-black px-6 py-3 font-medium text-white transition hover:opacity-90"
        >
          Add
        </button>

      </div>
    </section>

    <section>
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold">
          Ready to harvest
        </h2>

        <span class="rounded-full bg-amber-100 px-3 py-1 text-sm text-amber-700">
          0 due
        </span>
      </div>

      <div class="rounded-3xl border bg-white p-10 text-center text-neutral-500 shadow-sm">
        No problems yet 🌿
      </div>
    </section>

  </div>
</div>
